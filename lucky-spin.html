<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tech59 × PayMoji — Lucky Spin</title>
<style>
:root { color-scheme: light; }
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, 'SF Pro Display', 'Inter', 'Segoe UI', sans-serif;
  background:
    radial-gradient(900px 460px at 88% 8%, rgba(163,221,58,0.22), transparent 60%),
    linear-gradient(150deg, #ECE7FF 0%, #FCEDF6 46%, #E9F4C9 100%);
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 32px 20px;
  color: #14211a;
  position: relative;
  overflow-x: hidden;
}

/* Diagonal croissant wallpaper — stack of independently-moving rows */
.bg-wallpaper {
  position: fixed;
  top: -30%; left: -30%; right: -30%; bottom: -30%;
  transform: rotate(-18deg);
  transform-origin: center center;
  z-index: 0;
  pointer-events: none;
  overflow: hidden;
}
.bg-row {
  height: 130px;
  display: flex;
  will-change: transform;
  align-items: center;
}
.bg-row.dir-right { animation: rowSlideRight 35s linear infinite; }
.bg-row.dir-left  { animation: rowSlideLeft  35s linear infinite; }
/* Slightly different speeds per row for a more organic drift */
.bg-row:nth-child(4n)   { animation-duration: 46s; }
.bg-row:nth-child(4n+1) { animation-duration: 28s; }
.bg-row:nth-child(4n+2) { animation-duration: 40s; }

@keyframes rowSlideRight {
  from { transform: translateX(-50%); }
  to   { transform: translateX(0); }
}
@keyframes rowSlideLeft {
  from { transform: translateX(0); }
  to   { transform: translateX(-50%); }
}

.croissant {
  flex: 0 0 130px;
  width: 130px; height: 130px;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 120 120' width='120' height='120'><g transform='translate(60 60) rotate(-12)'><path d='M -40 -10 C -46 -34 -18 -46 8 -44 C 36 -42 46 -22 44 4 C 42 26 22 42 -4 40 C -32 38 -34 14 -40 -10 Z' fill='%23FDC231'/><path d='M -42 -6 C -50 -30 -22 -44 4 -44' fill='none' stroke='%23F27958' stroke-width='2.5' stroke-linecap='round'/><path d='M -30 -18 C -18 -30 6 -32 20 -26' fill='none' stroke='%23F27958' stroke-width='2.5' stroke-linecap='round'/><path d='M -22 0 C -6 -4 16 -2 30 4' fill='none' stroke='%23F27958' stroke-width='2.5' stroke-linecap='round'/><path d='M -14 18 C 4 15 22 20 34 24' fill='none' stroke='%23F27958' stroke-width='2.5' stroke-linecap='round'/><circle cx='6' cy='-18' r='1.5' fill='white'/></g></svg>");
  background-size: contain;
  background-repeat: no-repeat;
  background-position: center;
  opacity: 0.12;
  transition: opacity 0.5s ease, transform 0.6s cubic-bezier(.22,1,.36,1), filter 0.6s ease;
}
.croissant.highlight {
  opacity: 1;
  transform: scale(1.35);
  filter: drop-shadow(0 10px 26px rgba(255,122,89,0.6)) drop-shadow(0 2px 6px rgba(0,0,0,0.18));
  z-index: 5;
}

body > * { position: relative; z-index: 1; }
.bg-wallpaper { z-index: 0; }

/* Confetti canvas — overlays on top of everything */
#confettiCanvas {
  position: fixed; inset: 0;
  z-index: 200;
  pointer-events: none;
}

/* Grab scooter drive-by — occasional emoji zips across the screen at a slight diagonal */
.scooter {
  position: fixed;
  left: 0;
  font-size: 68px;
  z-index: 5;
  pointer-events: none;
  will-change: transform;
  filter: drop-shadow(0 6px 16px rgba(0,0,0,0.18));
  line-height: 1;
}
.scooter span {
  display: inline-block;
  animation: scoot-bob 0.5s ease-in-out infinite;
}
.scooter.dir-right { animation: scoot-r var(--dur, 6s) linear forwards; }
.scooter.dir-left  { animation: scoot-l var(--dur, 6s) linear forwards; }
@keyframes scoot-r {
  from { transform: translate(-160px, 0); }
  to   { transform: translate(calc(100vw + 40px), var(--diag, 0px)); }
}
@keyframes scoot-l {
  from { transform: translate(calc(100vw + 40px), 0); }
  to   { transform: translate(-160px, var(--diag, 0px)); }
}
@keyframes scoot-bob {
  0%, 100% { transform: translateY(0); }
  50%      { transform: translateY(-5px); }
}

/* ═══ Card / Grid ═══ */
.app {
  background: #fafcfa;
  border-radius: 40px;
  padding: 40px 44px;
  max-width: 1120px; width: 100%;
  box-shadow:
    0 32px 80px rgba(80,40,160,0.12),
    0 8px 24px rgba(0,0,0,0.05),
    inset 0 1px 0 rgba(255,255,255,0.9);
}

.app-grid {
  display: grid;
  grid-template-columns: minmax(480px, 520px) 1fr;
  gap: 56px;
  align-items: center;
}

@media (max-width: 960px) {
  .app { padding: 28px 24px; border-radius: 30px; }
  .app-grid { grid-template-columns: 1fr; gap: 32px; }
}

/* ═══ Left column (wheel) ═══ */
.left-col {
  display: flex; flex-direction: column; align-items: center;
  min-width: 0;
}

.wheel-area {
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 28px;
}
.wheel-wrapper { position: relative; }
.pointer {
  position: absolute; top: -8px; left: 50%;
  transform: translateX(-50%);
  width: 0; height: 0;
  border-left: 16px solid transparent;
  border-right: 16px solid transparent;
  border-top: 34px solid #14211a;
  z-index: 10;
  filter: drop-shadow(0 4px 10px rgba(20,33,26,0.25));
}
.pointer.bounce { animation: pb 0.4s cubic-bezier(.36,.07,.19,.97); }
@keyframes pb {
  0%   { transform: translateX(-50%) scaleY(1); }
  30%  { transform: translateX(-50%) scaleY(1.4); }
  65%  { transform: translateX(-50%) scaleY(0.75); }
  100% { transform: translateX(-50%) scaleY(1); }
}
#wheelCanvas {
  display: block; border-radius: 50%;
  box-shadow:
    0 20px 60px rgba(20,33,26,0.12),
    0 4px 18px rgba(163,221,58,0.14);
}

/* ═══ Buttons ═══ */
.btn {
  border: none; cursor: pointer; font-family: inherit;
  font-weight: 800; transition: transform 0.1s, box-shadow 0.15s, opacity 0.2s;
}
.btn:active:not(:disabled) { transform: scale(0.97); }
.btn:disabled { opacity: 0.38; cursor: not-allowed; }

.spin-btn {
  display: block; width: 100%; max-width: 460px; padding: 18px;
  font-size: 18px; border-radius: 50px; letter-spacing: 0.3px;
  background: linear-gradient(135deg, #A3DD3A, #8FCA2B);
  color: #14211a;
  box-shadow: 0 8px 24px rgba(143,202,43,0.42);
  margin-bottom: 12px;
}
.spin-btn:hover:not(:disabled) {
  box-shadow: 0 10px 30px rgba(143,202,43,0.55);
  transform: translateY(-1px);
}

.reset-btn {
  display: block; width: 100%; max-width: 460px; padding: 12px;
  font-size: 12.5px; border-radius: 50px; letter-spacing: 0.2px;
  background: transparent; color: #97a59c; font-weight: 700;
  border: 1.5px solid #eaebee;
}
.reset-btn:hover:not(:disabled) { color: #14211a; border-color: #14211a; background: rgba(20,33,26,0.02); }

/* ═══ Right column ═══ */
.right-col {
  display: flex; flex-direction: column; gap: 24px;
  min-width: 0;
}

.brand-block { }
.brand-eyebrow {
  font-size: 11px; font-weight: 700; letter-spacing: 3px;
  text-transform: uppercase; color: #97a59c;
}
.brand-title {
  margin-top: 6px;
  font-size: 40px; font-weight: 900; color: #14211a;
  letter-spacing: -1.2px; line-height: 1.05;
}
.brand-title .x {
  display: inline-block;
  margin: 0 6px;
  color: #A3DD3A;
  font-weight: 700;
}

/* Prize pool */
.prize-display {
  background: linear-gradient(150deg, #ECE7FF 0%, #FCEDF6 46%, #E9F4C9 100%);
  border-radius: 24px;
  padding: 22px 26px;
  transition: transform 0.25s ease;
}
.prize-tag {
  font-size: 10px; font-weight: 700; letter-spacing: 2.5px;
  text-transform: uppercase; color: #6a7a70;
}
.prize-number {
  display: flex; align-items: baseline; gap: 8px;
  margin-top: 8px;
}
.prize-amount {
  font-size: 46px; font-weight: 900; color: #14211a;
  font-variant-numeric: tabular-nums; letter-spacing: -1.8px;
  line-height: 1; transition: color 0.15s;
}
.prize-cur { font-size: 17px; font-weight: 700; color: #97a59c; letter-spacing: 0.5px; }

.empty-banner {
  display: none;
  font-size: 12px; font-weight: 700; color: #e63946;
  margin-top: 8px;
}

/* Result panel */
.result-panel {
  background: #f6f8f4;
  border: 1px solid #eef0ec;
  border-radius: 24px;
  padding: 26px 26px 24px;
  min-height: 300px;
  display: flex; flex-direction: column;
}

/* Empty state — 3-prize legend */
.result-empty {
  flex: 1;
  display: flex; flex-direction: column;
  padding: 4px 4px;
}
.legend-header {
  font-size: 14px; font-weight: 700; letter-spacing: 2.5px;
  text-transform: uppercase; color: #6a7a70;
  text-align: center; margin-bottom: 20px;
}
.prize-legend {
  display: flex; flex-direction: column; gap: 12px;
}
.legend-item {
  display: flex; align-items: stretch;
  background: #ffffff;
  border: 1px solid #eef0ec;
  border-radius: 14px;
  overflow: hidden;
  transition: transform 0.12s ease, box-shadow 0.15s ease;
}
.legend-item:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 18px rgba(20,33,26,0.06);
}
.legend-item.jackpot {
  border-color: #FFCD4D;
  background: linear-gradient(135deg, #FFF7E0 0%, #FFEFCC 100%);
  box-shadow: 0 4px 14px rgba(255,122,89,0.15);
}
.legend-swatch {
  flex: 0 0 10px;
}
.legend-swatch.green  { background: linear-gradient(180deg, #D9EE9E, #8FCA2B); }
.legend-swatch.blue   { background: linear-gradient(180deg, #9BBAFF, #4E7FE0); }
.legend-swatch.coral  { background: linear-gradient(180deg, #FFCD4D, #FF7A59); }
.legend-body {
  display: flex; flex-direction: column; gap: 6px;
  padding: 16px 20px; flex: 1;
}
.legend-amount {
  font-size: 19px; font-weight: 800; color: #14211a;
  letter-spacing: -0.3px; display: flex; align-items: center; gap: 10px;
}
.jackpot-tag {
  display: inline-block;
  font-size: 10.5px; font-weight: 800; letter-spacing: 1.5px;
  color: #7A3A00; background: #FFCD4D;
  padding: 3px 9px; border-radius: 8px;
}
.legend-reward {
  display: flex; align-items: center; gap: 10px;
  font-size: 16px; font-weight: 600; color: #41514a;
}
.legend-icon { font-size: 26px; line-height: 1; }

/* Won state */
.result-won { display: none; }
.result-won.visible {
  display: block;
  animation: fadeUp 0.32s cubic-bezier(.22,1,.36,1) forwards;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

.won-header { text-align: center; margin-bottom: 20px; }
.won-eyebrow {
  font-size: 10px; font-weight: 700; letter-spacing: 2.5px;
  text-transform: uppercase; color: #6a7a70;
}
.won-row {
  display: flex; align-items: baseline; justify-content: center; gap: 8px;
  margin-top: 8px;
}
.won-amount { font-size: 46px; font-weight: 900; color: #14211a; letter-spacing: -1.8px; line-height: 1; }
.won-cur    { font-size: 18px; font-weight: 700; color: #97a59c; }

/* Won-item card */
.won-item {
  display: flex; flex-direction: column; align-items: center; gap: 10px;
  background: #ffffff;
  border: 1px solid #eef0ec;
  border-radius: 16px;
  padding: 22px 20px;
  margin-bottom: 20px;
}
.won-item-icon { font-size: 56px; line-height: 1; }
.won-item-name { font-size: 16px; font-weight: 800; color: #14211a; letter-spacing: -0.2px; }

/* Combos (legacy — kept out of use) */
.combos-section { margin-bottom: 20px; }
.section-label {
  font-size: 10px; font-weight: 700; letter-spacing: 2.5px;
  text-transform: uppercase; color: #97a59c;
  text-align: center; margin-bottom: 14px;
}
.combo-row {
  display: flex; align-items: center; justify-content: center;
  gap: 8px; padding: 4px 0;
}
.c-icon { font-size: 28px; line-height: 1; }
.c-plus  { font-size: 15px; font-weight: 800; color: #c8c8d0; }
.combo-or {
  display: flex; align-items: center; gap: 12px; margin: 2px 0;
}
.combo-or-line  { flex: 1; height: 1px; background: #e7ece8; }
.combo-or-text  {
  font-size: 10px; font-weight: 700; color: #97a59c;
  letter-spacing: 2px; text-transform: uppercase;
}

/* QR grid */
.qr-bottom-section { margin-bottom: 20px; }
.qr-bottom-grid {
  display: flex; gap: 12px; justify-content: center; align-items: flex-start;
  flex-wrap: wrap;
}
.qr-btm-item {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  flex: 1 1 100px; max-width: 128px;
}
.qr-btm-item canvas {
  display: block; width: 100%; height: auto; border-radius: 10px;
  box-shadow: 0 4px 16px rgba(20,33,26,0.08);
  background: #fff;
}
.qr-btm-icon  { font-size: 16px; }
.qr-btm-name  { font-size: 10.5px; font-weight: 700; color: #41514a; text-align: center; line-height: 1.3; }
.qr-btm-price { font-size: 10.5px; font-weight: 800; color: #97a59c; }

.validate-btn {
  display: block; width: 100%; padding: 16px;
  font-size: 16px; border-radius: 50px; letter-spacing: 0.2px;
  background: linear-gradient(135deg, #A3DD3A, #8FCA2B);
  color: #14211a;
  box-shadow: 0 6px 22px rgba(143,202,43,0.42);
}
.validate-btn:hover {
  box-shadow: 0 8px 30px rgba(143,202,43,0.55);
  transform: translateY(-1px);
}

/* Fullscreen toggle — floats top-right of viewport */
.fs-btn {
  position: fixed;
  top: 18px; right: 18px;
  width: 44px; height: 44px; border-radius: 50%;
  border: none; cursor: pointer;
  background: rgba(255,255,255,0.9);
  box-shadow: 0 4px 14px rgba(20,33,26,0.12);
  color: #14211a;
  display: flex; align-items: center; justify-content: center;
  z-index: 100;
  transition: transform 0.12s, box-shadow 0.15s;
  backdrop-filter: blur(6px);
}
.fs-btn:hover { transform: scale(1.05); box-shadow: 0 6px 20px rgba(20,33,26,0.18); }
.fs-btn svg { width: 20px; height: 20px; }
:fullscreen .fs-btn { background: rgba(255,255,255,0.7); }
</style>
</head>
<body>
<div class="bg-wallpaper" id="bgWallpaper"></div>
<canvas id="confettiCanvas"></canvas>
<button class="fs-btn" id="fsBtn" onclick="toggleFullscreen()" title="Toggle fullscreen (F11)">
  <svg id="fsIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5"/>
  </svg>
</button>
<div class="app">
  <div class="app-grid">

    <!-- ══════ LEFT — WHEEL ══════ -->
    <div class="left-col">
      <div class="wheel-area">
        <div class="wheel-wrapper">
          <div class="pointer" id="pointer"></div>
          <canvas id="wheelCanvas" width="460" height="460"></canvas>
        </div>
      </div>
      <button class="btn spin-btn" id="spinBtn" onclick="spin()">🎰  Spin the wheel</button>
    </div>

    <!-- ══════ RIGHT — TITLE + REWARDS ══════ -->
    <div class="right-col">
      <div class="brand-block">
        <div class="brand-eyebrow">Lucky Spin</div>
        <div class="brand-title">Tech59<span class="x">×</span>PayMoji</div>
      </div>

      <div class="result-panel">
        <!-- Empty state — the 3-prize legend -->
        <div class="result-empty" id="resultEmpty">
          <div class="legend-header">🎁 Prizes</div>
          <div class="prize-legend">
            <div class="legend-item">
              <span class="legend-swatch green"></span>
              <div class="legend-body">
                <div class="legend-amount">50.000₫</div>
                <div class="legend-reward"><span class="legend-icon">🥐</span> 1 Plain Croissant</div>
              </div>
            </div>
            <div class="legend-item">
              <span class="legend-swatch blue"></span>
              <div class="legend-body">
                <div class="legend-amount">50.000₫</div>
                <div class="legend-reward"><span class="legend-icon">🍳</span> 1 Egg Croissant</div>
              </div>
            </div>
            <div class="legend-item jackpot">
              <span class="legend-swatch coral"></span>
              <div class="legend-body">
                <div class="legend-amount">250.000₫ <span class="jackpot-tag">JACKPOT</span></div>
                <div class="legend-reward"><span class="legend-icon">👕</span> 1 T-shirt</div>
              </div>
            </div>
          </div>
        </div>

        <!-- Won state — the single prize you won -->
        <div class="result-won" id="resultWon">
          <div class="won-header">
            <div class="won-eyebrow">🎉 You won</div>
            <div class="won-row">
              <span class="won-amount" id="wonAmountDisplay">50.000</span>
              <span class="won-cur">₫</span>
            </div>
          </div>

          <div class="won-item" id="wonItem">
            <span class="won-item-icon" id="wonItemIcon">🥐</span>
            <div class="won-item-name" id="wonItemName">1 Plain Croissant</div>
          </div>

          <button class="btn validate-btn" onclick="validate()">Scan &amp; Pay with PayMoji</button>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
// ═══════════ ITEMS ═══════════
const ITEMS = {
  plain:  { icon: '🥐', name: '1 Plain Croissant', price: 50000  },
  egg:    { icon: '🍳', name: '1 Egg Croissant',   price: 50000  },
  tshirt: { icon: '👕', name: '1 T-shirt',          price: 250000 },
};

// ═══════════ STATE ═══════════
let isSpinning = false, currentRot = 0, wonKey = 'plain';

// ═══════════ SECTORS ═══════════
// Each sector maps to a specific prize.
const SECTOR_DEFS = [
  { prize: 'plain',  units: 4 },   // green wide
  { prize: 'egg',    units: 3 },   // blue medium
  { prize: 'plain',  units: 4 },
  { prize: 'egg',    units: 3 },
  { prize: 'plain',  units: 4 },
  { prize: 'egg',    units: 3 },
  { prize: 'tshirt', units: 1.5 }, // jackpot
];
const TOTAL_UNITS = SECTOR_DEFS.reduce((s, d) => s + d.units, 0);
// Shift so the jackpot sector's MIDPOINT sits at the top (under the pointer) at rest.
const JACKPOT_UNITS = SECTOR_DEFS[SECTOR_DEFS.length - 1].units;
const PREV_UNITS    = TOTAL_UNITS - JACKPOT_UNITS;
const SECTOR_SHIFT  = 2 * Math.PI * (1 - (PREV_UNITS + JACKPOT_UNITS / 2) / TOTAL_UNITS);
let _cum = SECTOR_SHIFT;
const sectors = SECTOR_DEFS.map((d) => {
  const span = (d.units / TOTAL_UNITS) * 2 * Math.PI;
  const start = _cum; _cum += span;
  return { ...d, startAngle: start, spanAngle: span };
});

// PayMoji-adjacent palette
// Wide (green) sectors → mint/lime; medium (blue) sectors → sky/blue
const SHADE_BY_UNITS = {
  4: [
    ['#F4FADD', '#D9EE9E'],
    ['#EFF7CC', '#C6E480'],
  ],
  3: [
    ['#DFEAFF', '#9BBAFF'],
    ['#D2E1FF', '#7FA8F7'],
  ],
};

// ═══════════ WHEEL DRAWING ═══════════
const wc   = document.getElementById('wheelCanvas');
const wctx = wc.getContext('2d');
// HiDPI: draw at devicePixelRatio for crisp text
const DPR = Math.max(1, window.devicePixelRatio || 1);
const CSS_SIZE = wc.width; // 460
wc.width  = CSS_SIZE * DPR;
wc.height = CSS_SIZE * DPR;
wc.style.width  = CSS_SIZE + 'px';
wc.style.height = CSS_SIZE + 'px';
wctx.scale(DPR, DPR);
const CX = CSS_SIZE / 2, CY = CSS_SIZE / 2;
const R  = CX - 6;
const BASE_ANGLE = -Math.PI / 2;

function drawWheel(rot) {
  wctx.clearRect(0, 0, CSS_SIZE, CSS_SIZE);
  wctx.save();
  wctx.translate(CX, CY);

  // ── Rotating sectors ──
  wctx.save();
  wctx.rotate(rot);

  let shadeIdx4 = 0, shadeIdx3 = 0;
  sectors.forEach((sec) => {
    const sa  = BASE_ANGLE + sec.startAngle;
    const ea  = sa + sec.spanAngle;
    const mid = sa + sec.spanAngle / 2;

    // Fill
    if (sec.prize === 'tshirt') {
      // 🏆 JACKPOT — PayMoji warm gradient (#FFCD4D → #FF7A59) with coral glow
      wctx.save();
      wctx.shadowColor = 'rgba(255,122,89,0.85)';
      wctx.shadowBlur  = 28;
      const angle = 135 * Math.PI / 180;
      const gx = Math.cos(angle) * R, gy = Math.sin(angle) * R;
      const jg = wctx.createLinearGradient(-gx, -gy, gx, gy);
      jg.addColorStop(0,   '#FFE39A');
      jg.addColorStop(0.5, '#FFCD4D');
      jg.addColorStop(1,   '#FF7A59');
      wctx.beginPath(); wctx.moveTo(0, 0);
      wctx.arc(0, 0, R, sa, ea); wctx.closePath();
      wctx.fillStyle = jg; wctx.fill();
      wctx.restore();

      // Warm highlight arc on the outer rim of the jackpot sector
      wctx.save();
      wctx.beginPath();
      wctx.arc(0, 0, R - 3, sa + 0.02, ea - 0.02);
      wctx.strokeStyle = '#FFE7B0';
      wctx.lineWidth = 4;
      wctx.shadowColor = 'rgba(255,205,77,0.95)';
      wctx.shadowBlur = 10;
      wctx.stroke();
      wctx.restore();
    } else {
      const shades = SHADE_BY_UNITS[sec.units][sec.units === 4 ? (shadeIdx4++ % 2) : (shadeIdx3++ % 2)];
      const g = wctx.createRadialGradient(0, 0, R * 0.15, 0, 0, R);
      g.addColorStop(0, shades[0]);
      g.addColorStop(1, shades[1]);
      wctx.beginPath(); wctx.moveTo(0, 0);
      wctx.arc(0, 0, R, sa, ea); wctx.closePath();
      wctx.fillStyle = g; wctx.fill();
    }

    // Text: price + prize emoji, same size everywhere
    wctx.save();
    wctx.rotate(mid);
    wctx.textBaseline = 'middle';
    wctx.textAlign = 'right';

    let priceText, emoji, priceColor;
    if (sec.prize === 'tshirt') {
      priceText = '250.000₫'; emoji = '👕'; priceColor = '#ffffff';
    } else if (sec.prize === 'plain') {
      priceText = '50.000₫';  emoji = '🥐'; priceColor = '#14211a';
    } else {
      priceText = '50.000₫';  emoji = '🍳'; priceColor = '#132C6B';
    }

    // Emoji at the outer edge
    wctx.font = '20px "Apple Color Emoji","Segoe UI Emoji",sans-serif';
    wctx.fillText(emoji, R - 14, 0);
    const emojiW = wctx.measureText(emoji).width;

    // Price to the left of the emoji
    wctx.font = '800 22px -apple-system,sans-serif';
    wctx.fillStyle = priceColor;
    wctx.fillText(priceText, R - 14 - emojiW - 5, 0);

    wctx.restore();
  });

  // ── Thin white spoke lines at each sector boundary ──
  wctx.save();
  wctx.strokeStyle = 'rgba(255,255,255,0.75)';
  wctx.lineWidth = 2;
  sectors.forEach(sec => {
    const angle = BASE_ANGLE + sec.startAngle;
    wctx.beginPath();
    wctx.moveTo(0, 0);
    wctx.lineTo(Math.cos(angle) * R, Math.sin(angle) * R);
    wctx.stroke();
  });
  wctx.restore();

  wctx.restore(); // undo rotation

  // ── Centre hub ──
  wctx.beginPath(); wctx.arc(0, 0, 34, 0, Math.PI * 2);
  wctx.fillStyle = '#ffffff'; wctx.fill();

  const dg = wctx.createRadialGradient(-4, -4, 0, 0, 0, 20);
  dg.addColorStop(0, '#D3F088'); dg.addColorStop(1, '#A3DD3A');
  wctx.beginPath(); wctx.arc(0, 0, 20, 0, Math.PI * 2);
  wctx.fillStyle = dg; wctx.fill();

  wctx.beginPath(); wctx.arc(-4, -4, 8, 0, Math.PI * 2);
  wctx.fillStyle = 'rgba(255,255,255,0.45)'; wctx.fill();

  wctx.restore();
}

function getSectorAtPointer(rot) {
  const TAU = 2 * Math.PI;
  const rel = ((-rot) % TAU + TAU) % TAU;
  for (const s of sectors) {
    const a = ((s.startAngle % TAU) + TAU) % TAU;
    const b = a + s.spanAngle;
    if (b <= TAU) {
      if (rel >= a && rel < b) return s;
    } else {
      if (rel >= a || rel < b - TAU) return s;
    }
  }
  return sectors[0];
}

// ═══════════ SPIN ═══════════
function spin() {
  if (isSpinning) return;
  // Reset result panel back to empty state (legend) before spinning
  document.getElementById('resultWon').classList.remove('visible');
  document.getElementById('resultEmpty').style.display = 'flex';

  isSpinning = true;
  document.getElementById('spinBtn').disabled = true;

  const totalSpin = (5 + Math.random()*3.5)*2*Math.PI + Math.random()*2*Math.PI;
  const startRot = currentRot, dur = 4200 + Math.random()*900, t0 = performance.now();
  const ease = t => 1 - Math.pow(1-t, 4);

  (function frame(now) {
    const t = Math.min((now-t0)/dur, 1);
    currentRot = startRot + ease(t)*totalSpin;
    drawWheel(currentRot);
    t < 1 ? requestAnimationFrame(frame) : onSpinEnd(startRot+totalSpin);
  })(t0);
}

function onSpinEnd(final) {
  currentRot = final; drawWheel(currentRot); isSpinning = false;
  const ptr = document.getElementById('pointer');
  ptr.classList.remove('bounce'); void ptr.offsetWidth; ptr.classList.add('bounce');
  wonKey = getSectorAtPointer(currentRot).prize;
  setTimeout(showResult, 550);
}

// ═══════════ SHOW RESULT ═══════════
function showResult() {
  const item = ITEMS[wonKey];
  document.getElementById('wonAmountDisplay').textContent = fmtVND(item.price);
  document.getElementById('wonItemIcon').textContent = item.icon;
  document.getElementById('wonItemName').textContent = item.name;
  document.getElementById('resultEmpty').style.display = 'none';
  const won = document.getElementById('resultWon');
  won.classList.remove('visible'); void won.offsetWidth; won.classList.add('visible');
  launchConfetti();
}

// ═══════════ VALIDATE ═══════════
function validate() {
  // Flip result panel back to empty state (legend), re-enable spin
  document.getElementById('resultWon').classList.remove('visible');
  document.getElementById('resultEmpty').style.display = 'flex';
  document.getElementById('spinBtn').disabled = false;
}

// ═══════════ FORMAT & INIT ═══════════
function fmtVND(n) { return Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g, '.'); }
drawWheel(0);

// ═══════════ ANIMATED BACKGROUND ═══════════
// Each row contains individual croissant elements so we can highlight one in place.
function buildWallpaper() {
  const bg = document.getElementById('bgWallpaper');
  if (!bg) return;
  const containerWidth  = bg.offsetWidth;
  const containerHeight = bg.offsetHeight;
  const rowCount = Math.ceil(containerHeight / 130) + 2;
  const perSet   = Math.ceil(containerWidth / 130) + 2;
  bg.innerHTML = '';
  for (let i = 0; i < rowCount; i++) {
    const row = document.createElement('div');
    row.className = 'bg-row ' + (i % 2 === 0 ? 'dir-right' : 'dir-left');
    row.style.animationDelay = (-Math.random() * 40) + 's';
    // Two copies of the tile set → row is 2× wide so translateX(-50%) loops seamlessly
    for (let j = 0; j < perSet * 2; j++) {
      const c = document.createElement('div');
      c.className = 'croissant';
      row.appendChild(c);
    }
    bg.appendChild(row);
  }
}
buildWallpaper();
let _rebuildTimer;
window.addEventListener('resize', () => {
  clearTimeout(_rebuildTimer);
  _rebuildTimer = setTimeout(() => { buildWallpaper(); resizeConfetti(); }, 200);
});

// ═══════════ SPOTLIGHT — highlight an existing on-screen croissant ═══════════
function popSpotlight() {
  // Clear any previous highlight
  document.querySelectorAll('.croissant.highlight').forEach(el => el.classList.remove('highlight'));
  const all = document.querySelectorAll('.bg-row .croissant');
  if (all.length === 0) return;
  // Only pick from croissants currently on screen (accounting for row transform + wallpaper rotation)
  const vw = window.innerWidth, vh = window.innerHeight;
  const visible = [];
  for (const el of all) {
    const r = el.getBoundingClientRect();
    // Require croissant to be fully inside the viewport with a little margin
    if (r.left > 40 && r.top > 40 && r.right < vw - 40 && r.bottom < vh - 40) {
      visible.push(el);
    }
  }
  if (visible.length === 0) return;
  const target = visible[Math.floor(Math.random() * visible.length)];
  target.classList.add('highlight');
  // Remove highlight after ~2.4s (fades via CSS transition)
  setTimeout(() => target.classList.remove('highlight'), 2400);
}
function scheduleSpotlight() {
  popSpotlight();
  const nextIn = 2800 + Math.random() * 2500; // 2.8–5.3s
  setTimeout(scheduleSpotlight, nextIn);
}
setTimeout(scheduleSpotlight, 1500);

// ═══════════ SCOOTER DRIVE-BY ═══════════
// Every so often a Grab-style scooter zips across the screen at a slight diagonal.
// 🛵 emoji faces left on most systems, so we drive R→L to match its orientation.
function launchScooter() {
  const el = document.createElement('div');
  el.className = 'scooter dir-left';
  el.innerHTML = '<span>🛵</span>';
  // Start Y — leave enough room for the diagonal drift
  const startY = 120 + Math.random() * Math.max(50, window.innerHeight - 320);
  el.style.top = startY + 'px';
  // Diagonal drift over the trip: ±60–140px, random up or down
  const dir  = Math.random() < 0.5 ? -1 : 1;
  const diag = (60 + Math.random() * 80) * dir;
  el.style.setProperty('--diag', diag + 'px');
  const dur = 5 + Math.random() * 3;
  el.style.setProperty('--dur', dur + 's');
  document.body.appendChild(el);
  setTimeout(() => el.remove(), dur * 1000 + 300);
}
function scheduleScooter() {
  launchScooter();
  const nextIn = 14000 + Math.random() * 22000; // 14–36s between rides
  setTimeout(scheduleScooter, nextIn);
}
setTimeout(scheduleScooter, 6000);

// ═══════════ CONFETTI ═══════════
const confettiCanvas = document.getElementById('confettiCanvas');
const cctx = confettiCanvas.getContext('2d');
let confettiParticles = [];
function resizeConfetti() {
  const dpr = Math.max(1, window.devicePixelRatio || 1);
  confettiCanvas.width  = window.innerWidth  * dpr;
  confettiCanvas.height = window.innerHeight * dpr;
  confettiCanvas.style.width  = window.innerWidth  + 'px';
  confettiCanvas.style.height = window.innerHeight + 'px';
  cctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resizeConfetti();

const CONFETTI_COLORS = ['#A3DD3A', '#8FCA2B', '#FFCD4D', '#FF7A59', '#4E7FE0', '#9BBAFF', '#FF4FA8', '#FFE39A'];

function launchConfetti() {
  const W = window.innerWidth, H = window.innerHeight;
  // Two bursts — from bottom-left and bottom-right — plus a top-down sprinkle
  const bursts = [
    { x: W * 0.15, y: H * 0.75, angle: -Math.PI/2 - 0.35, count: 90 },
    { x: W * 0.85, y: H * 0.75, angle: -Math.PI/2 + 0.35, count: 90 },
  ];
  bursts.forEach(b => {
    for (let i = 0; i < b.count; i++) {
      const spread = 0.9; // radians
      const dir = b.angle + (Math.random() - 0.5) * spread;
      const speed = 8 + Math.random() * 10;
      confettiParticles.push({
        x: b.x, y: b.y,
        vx: Math.cos(dir) * speed,
        vy: Math.sin(dir) * speed,
        w: 6 + Math.random() * 6,
        h: 9 + Math.random() * 8,
        rot: Math.random() * Math.PI * 2,
        vrot: (Math.random() - 0.5) * 0.4,
        color: CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)],
        life: 1,
        drag: 0.985,
        gravity: 0.28,
      });
    }
  });
  // Top-down sprinkle
  for (let i = 0; i < 60; i++) {
    confettiParticles.push({
      x: Math.random() * W,
      y: -20 - Math.random() * 40,
      vx: (Math.random() - 0.5) * 3,
      vy: 2 + Math.random() * 4,
      w: 6 + Math.random() * 6,
      h: 9 + Math.random() * 8,
      rot: Math.random() * Math.PI * 2,
      vrot: (Math.random() - 0.5) * 0.3,
      color: CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)],
      life: 1,
      drag: 0.995,
      gravity: 0.18,
    });
  }
  if (!confettiRunning) { confettiRunning = true; requestAnimationFrame(confettiFrame); }
}

let confettiRunning = false;
function confettiFrame() {
  cctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
  const H = window.innerHeight;
  for (let i = confettiParticles.length - 1; i >= 0; i--) {
    const p = confettiParticles[i];
    p.vx *= p.drag; p.vy = p.vy * p.drag + p.gravity;
    p.x += p.vx; p.y += p.vy; p.rot += p.vrot;
    if (p.y > H + 50) { p.life -= 0.03; }
    if (p.life <= 0) { confettiParticles.splice(i, 1); continue; }
    cctx.save();
    cctx.translate(p.x, p.y); cctx.rotate(p.rot);
    cctx.globalAlpha = Math.max(0, Math.min(1, p.life));
    cctx.fillStyle = p.color;
    cctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
    cctx.restore();
  }
  if (confettiParticles.length === 0) {
    confettiRunning = false;
    cctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
    return;
  }
  requestAnimationFrame(confettiFrame);
}

// ═══════════ FULLSCREEN + WAKE LOCK ═══════════
let wakeLock = null;
async function requestWakeLock() {
  if ('wakeLock' in navigator) {
    try { wakeLock = await navigator.wakeLock.request('screen'); } catch (e) {}
  }
}
function releaseWakeLock() {
  if (wakeLock) { wakeLock.release(); wakeLock = null; }
}
function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(() => {});
  } else {
    document.exitFullscreen();
  }
}
document.addEventListener('fullscreenchange', () => {
  const icon = document.getElementById('fsIcon');
  if (document.fullscreenElement) {
    // "exit fullscreen" icon (arrows pointing inward)
    icon.innerHTML = '<path d="M9 4v5H4M15 4v5h5M9 20v-5H4M15 20v-5h5"/>';
    requestWakeLock();
  } else {
    // "enter fullscreen" icon (arrows pointing outward)
    icon.innerHTML = '<path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5"/>';
    releaseWakeLock();
  }
});
// Re-acquire wake lock if user tabs away and back
document.addEventListener('visibilitychange', () => {
  if (document.fullscreenElement && document.visibilityState === 'visible') {
    requestWakeLock();
  }
});
</script>
