<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tech50 × PayMoji — Lucky Spin</title>
<style>
:root { color-scheme: light; }
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, 'SF Pro Display', 'Inter', 'Segoe UI', sans-serif;
  background:
    radial-gradient(900px 460px at 88% 8%, rgba(163,221,58,0.22), transparent 60%),
    linear-gradient(150deg, #ECE7FF 0%, #FCEDF6 46%, #E9F4C9 100%);
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 32px 20px;
  color: #14211a;
}

/* ═══ Card / Grid ═══ */
.app {
  background: #fafcfa;
  border-radius: 40px;
  padding: 40px 44px;
  max-width: 1120px; width: 100%;
  box-shadow:
    0 32px 80px rgba(80,40,160,0.12),
    0 8px 24px rgba(0,0,0,0.05),
    inset 0 1px 0 rgba(255,255,255,0.9);
}

.app-grid {
  display: grid;
  grid-template-columns: minmax(480px, 520px) 1fr;
  gap: 56px;
  align-items: center;
}

@media (max-width: 960px) {
  .app { padding: 28px 24px; border-radius: 30px; }
  .app-grid { grid-template-columns: 1fr; gap: 32px; }
}

/* ═══ Left column (wheel) ═══ */
.left-col {
  display: flex; flex-direction: column; align-items: center;
  min-width: 0;
}

.wheel-area {
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 28px;
}
.wheel-wrapper { position: relative; }
.pointer {
  position: absolute; top: -8px; left: 50%;
  transform: translateX(-50%);
  width: 0; height: 0;
  border-left: 16px solid transparent;
  border-right: 16px solid transparent;
  border-top: 34px solid #14211a;
  z-index: 10;
  filter: drop-shadow(0 4px 10px rgba(20,33,26,0.25));
}
.pointer.bounce { animation: pb 0.4s cubic-bezier(.36,.07,.19,.97); }
@keyframes pb {
  0%   { transform: translateX(-50%) scaleY(1); }
  30%  { transform: translateX(-50%) scaleY(1.4); }
  65%  { transform: translateX(-50%) scaleY(0.75); }
  100% { transform: translateX(-50%) scaleY(1); }
}
#wheelCanvas {
  display: block; border-radius: 50%;
  box-shadow:
    0 20px 60px rgba(20,33,26,0.12),
    0 4px 18px rgba(163,221,58,0.14);
}

/* ═══ Buttons ═══ */
.btn {
  border: none; cursor: pointer; font-family: inherit;
  font-weight: 800; transition: transform 0.1s, box-shadow 0.15s, opacity 0.2s;
}
.btn:active:not(:disabled) { transform: scale(0.97); }
.btn:disabled { opacity: 0.38; cursor: not-allowed; }

.spin-btn {
  display: block; width: 100%; max-width: 460px; padding: 18px;
  font-size: 18px; border-radius: 50px; letter-spacing: 0.3px;
  background: linear-gradient(135deg, #A3DD3A, #8FCA2B);
  color: #14211a;
  box-shadow: 0 8px 24px rgba(143,202,43,0.42);
  margin-bottom: 12px;
}
.spin-btn:hover:not(:disabled) {
  box-shadow: 0 10px 30px rgba(143,202,43,0.55);
  transform: translateY(-1px);
}

.reset-btn {
  display: block; width: 100%; max-width: 460px; padding: 12px;
  font-size: 12.5px; border-radius: 50px; letter-spacing: 0.2px;
  background: transparent; color: #97a59c; font-weight: 700;
  border: 1.5px solid #eaebee;
}
.reset-btn:hover:not(:disabled) { color: #14211a; border-color: #14211a; background: rgba(20,33,26,0.02); }

/* ═══ Right column ═══ */
.right-col {
  display: flex; flex-direction: column; gap: 24px;
  min-width: 0;
}

.brand-block { }
.brand-eyebrow {
  font-size: 11px; font-weight: 700; letter-spacing: 3px;
  text-transform: uppercase; color: #97a59c;
}
.brand-title {
  margin-top: 6px;
  font-size: 40px; font-weight: 900; color: #14211a;
  letter-spacing: -1.2px; line-height: 1.05;
}
.brand-title .x {
  display: inline-block;
  margin: 0 6px;
  color: #A3DD3A;
  font-weight: 700;
}

/* Prize pool */
.prize-display {
  background: linear-gradient(150deg, #ECE7FF 0%, #FCEDF6 46%, #E9F4C9 100%);
  border-radius: 24px;
  padding: 22px 26px;
  transition: transform 0.25s ease;
}
.prize-tag {
  font-size: 10px; font-weight: 700; letter-spacing: 2.5px;
  text-transform: uppercase; color: #6a7a70;
}
.prize-number {
  display: flex; align-items: baseline; gap: 8px;
  margin-top: 8px;
}
.prize-amount {
  font-size: 46px; font-weight: 900; color: #14211a;
  font-variant-numeric: tabular-nums; letter-spacing: -1.8px;
  line-height: 1; transition: color 0.15s;
}
.prize-cur { font-size: 17px; font-weight: 700; color: #97a59c; letter-spacing: 0.5px; }

.empty-banner {
  display: none;
  font-size: 12px; font-weight: 700; color: #e63946;
  margin-top: 8px;
}

/* Result panel */
.result-panel {
  background: #f6f8f4;
  border: 1px solid #eef0ec;
  border-radius: 24px;
  padding: 26px 26px 24px;
  min-height: 300px;
  display: flex; flex-direction: column;
}

/* Empty state */
.result-empty {
  flex: 1;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  text-align: center;
  padding: 24px 8px;
}
.result-empty .icon {
  font-size: 40px; margin-bottom: 12px; opacity: 0.75;
}
.result-empty h3 {
  font-size: 18px; font-weight: 800; color: #14211a; margin-bottom: 6px;
  letter-spacing: -0.3px;
}
.result-empty p {
  font-size: 13px; color: #6a7a70; font-weight: 600; line-height: 1.5;
  max-width: 260px;
}

/* Won state */
.result-won { display: none; }
.result-won.visible {
  display: block;
  animation: fadeUp 0.32s cubic-bezier(.22,1,.36,1) forwards;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

.won-header { text-align: center; margin-bottom: 20px; }
.won-eyebrow {
  font-size: 10px; font-weight: 700; letter-spacing: 2.5px;
  text-transform: uppercase; color: #6a7a70;
}
.won-row {
  display: flex; align-items: baseline; justify-content: center; gap: 8px;
  margin-top: 8px;
}
.won-amount { font-size: 46px; font-weight: 900; color: #14211a; letter-spacing: -1.8px; line-height: 1; }
.won-cur    { font-size: 18px; font-weight: 700; color: #97a59c; }

/* Combos */
.combos-section { margin-bottom: 20px; }
.section-label {
  font-size: 10px; font-weight: 700; letter-spacing: 2.5px;
  text-transform: uppercase; color: #97a59c;
  text-align: center; margin-bottom: 14px;
}
.combo-row {
  display: flex; align-items: center; justify-content: center;
  gap: 8px; padding: 4px 0;
}
.c-icon { font-size: 28px; line-height: 1; }
.c-plus  { font-size: 15px; font-weight: 800; color: #c8c8d0; }
.combo-or {
  display: flex; align-items: center; gap: 12px; margin: 2px 0;
}
.combo-or-line  { flex: 1; height: 1px; background: #e7ece8; }
.combo-or-text  {
  font-size: 10px; font-weight: 700; color: #97a59c;
  letter-spacing: 2px; text-transform: uppercase;
}

/* QR grid */
.qr-bottom-section { margin-bottom: 20px; }
.qr-bottom-grid {
  display: flex; gap: 12px; justify-content: center; align-items: flex-start;
  flex-wrap: wrap;
}
.qr-btm-item {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  flex: 1 1 100px; max-width: 128px;
}
.qr-btm-item canvas {
  display: block; width: 100%; height: auto; border-radius: 10px;
  box-shadow: 0 4px 16px rgba(20,33,26,0.08);
  background: #fff;
}
.qr-btm-icon  { font-size: 16px; }
.qr-btm-name  { font-size: 10.5px; font-weight: 700; color: #41514a; text-align: center; line-height: 1.3; }
.qr-btm-price { font-size: 10.5px; font-weight: 800; color: #97a59c; }

.validate-btn {
  display: block; width: 100%; padding: 16px;
  font-size: 16px; border-radius: 50px; letter-spacing: 0.2px;
  background: linear-gradient(135deg, #A3DD3A, #8FCA2B);
  color: #14211a;
  box-shadow: 0 6px 22px rgba(143,202,43,0.42);
}
.validate-btn:hover {
  box-shadow: 0 8px 30px rgba(143,202,43,0.55);
  transform: translateY(-1px);
}
</style>
</head>
<body>
<div class="app">
  <div class="app-grid">

    <!-- ══════ LEFT — WHEEL ══════ -->
    <div class="left-col">
      <div class="wheel-area">
        <div class="wheel-wrapper">
          <div class="pointer" id="pointer"></div>
          <canvas id="wheelCanvas" width="460" height="460"></canvas>
        </div>
      </div>
      <button class="btn spin-btn" id="spinBtn" onclick="spin()">🎰  Spin the wheel</button>
      <button class="btn reset-btn" id="resetBtn" onclick="resetPrize()">↺  Reset Prize Pool</button>
    </div>

    <!-- ══════ RIGHT — TITLE, POOL, REWARDS ══════ -->
    <div class="right-col">
      <div class="brand-block">
        <div class="brand-eyebrow">Lucky Spin</div>
        <div class="brand-title">Tech50<span class="x">×</span>PayMoji</div>
      </div>

      <div class="prize-display" id="prizeBox">
        <div class="prize-tag">Prize Pool</div>
        <div class="prize-number">
          <span class="prize-amount" id="prizeDisplay">6.500.000</span>
          <span class="prize-cur">₫</span>
        </div>
        <div class="empty-banner" id="emptyBanner">Prize pool exhausted — hit Reset to play again.</div>
      </div>

      <div class="result-panel">
        <!-- Empty state (before spin / after validate) -->
        <div class="result-empty" id="resultEmpty">
          <div class="icon">🎁</div>
          <h3>Ready to win?</h3>
          <p>Spin the wheel to reveal your prize and see the rewards you can redeem.</p>
        </div>

        <!-- Won state (after spin) -->
        <div class="result-won" id="resultWon">
          <div class="won-header">
            <div class="won-eyebrow">🎉 You won</div>
            <div class="won-row">
              <span class="won-amount" id="wonAmountDisplay">50.000</span>
              <span class="won-cur">₫</span>
            </div>
          </div>

          <div class="combos-section">
            <div class="section-label">What you can get</div>
            <div id="combosList"></div>
          </div>

          <button class="btn validate-btn" onclick="validate()">✓  Validate &amp; Redeem</button>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
// ═══════════ ITEMS & REDEMPTION OPTIONS ═══════════
const ITEMS = {
  plain: { icon: '🥐', name: 'Plain Croissant', price: 50000,  seed: 11111 },
  egg:   { icon: '🍳', name: 'Egg Croissant',   price: 50000,  seed: 67890 },
  cake:  { icon: '🎂', name: 'Cake',             price: 250000, seed: 54321 },
};
const REDEEMS = {
  50000: [
    [{ key: 'plain', n: 1 }],
    [{ key: 'egg',   n: 1 }],
  ],
  250000: [
    [{ key: 'plain', n: 5 }],
    [{ key: 'egg',   n: 5 }],
    [{ key: 'cake',  n: 1 }],
  ],
};
const QR_KEYS = {
  50000:  ['plain', 'egg'],
  250000: ['plain', 'egg', 'cake'],
};

// ═══════════ STATE ═══════════
const TOTAL = 6_500_000;
let totalPrize = TOTAL, isSpinning = false, currentRot = 0, wonAmount = 0;

// ═══════════ SECTORS ═══════════
const SECTOR_DEFS = [
  { value: 50000,  units: 4 },
  { value: 50000,  units: 3 },
  { value: 50000,  units: 4 },
  { value: 50000,  units: 3 },
  { value: 50000,  units: 4 },
  { value: 50000,  units: 3 },
  { value: 250000, units: 1.5 },
];
const TOTAL_UNITS = SECTOR_DEFS.reduce((s, d) => s + d.units, 0);
// Shift so the jackpot sector's MIDPOINT sits at the top (under the pointer) at rest.
const JACKPOT_UNITS = SECTOR_DEFS[SECTOR_DEFS.length - 1].units;
const PREV_UNITS    = TOTAL_UNITS - JACKPOT_UNITS;
const SECTOR_SHIFT  = 2 * Math.PI * (1 - (PREV_UNITS + JACKPOT_UNITS / 2) / TOTAL_UNITS);
let _cum = SECTOR_SHIFT;
const sectors = SECTOR_DEFS.map((d) => {
  const span = (d.units / TOTAL_UNITS) * 2 * Math.PI;
  const start = _cum; _cum += span;
  return { ...d, startAngle: start, spanAngle: span };
});

// PayMoji pastel palette
const SHADE_BY_UNITS = {
  4: [
    ['#F4FADD', '#D9EE9E'],
    ['#EFF7CC', '#C6E480'],
  ],
  3: [
    ['#FBF2FF', '#DECBFF'],
    ['#FFF2FA', '#F7CFE3'],
  ],
};

// ═══════════ WHEEL DRAWING ═══════════
const wc   = document.getElementById('wheelCanvas');
const wctx = wc.getContext('2d');
// HiDPI: draw at devicePixelRatio for crisp text
const DPR = Math.max(1, window.devicePixelRatio || 1);
const CSS_SIZE = wc.width; // 460
wc.width  = CSS_SIZE * DPR;
wc.height = CSS_SIZE * DPR;
wc.style.width  = CSS_SIZE + 'px';
wc.style.height = CSS_SIZE + 'px';
wctx.scale(DPR, DPR);
const CX = CSS_SIZE / 2, CY = CSS_SIZE / 2;
const R  = CX - 6;
const BASE_ANGLE = -Math.PI / 2;

function drawWheel(rot) {
  wctx.clearRect(0, 0, CSS_SIZE, CSS_SIZE);
  wctx.save();
  wctx.translate(CX, CY);

  // ── Rotating sectors ──
  wctx.save();
  wctx.rotate(rot);

  let shadeIdx4 = 0, shadeIdx3 = 0;
  sectors.forEach((sec) => {
    const sa  = BASE_ANGLE + sec.startAngle;
    const ea  = sa + sec.spanAngle;
    const mid = sa + sec.spanAngle / 2;

    // Fill
    if (sec.value === 250000) {
      // 🏆 JACKPOT — PayMoji warm gradient (#FFCD4D → #FF7A59) with coral glow
      wctx.save();
      wctx.shadowColor = 'rgba(255,122,89,0.85)';
      wctx.shadowBlur  = 28;
      const angle = 135 * Math.PI / 180;
      const gx = Math.cos(angle) * R, gy = Math.sin(angle) * R;
      const jg = wctx.createLinearGradient(-gx, -gy, gx, gy);
      jg.addColorStop(0,   '#FFE39A');
      jg.addColorStop(0.5, '#FFCD4D');
      jg.addColorStop(1,   '#FF7A59');
      wctx.beginPath(); wctx.moveTo(0, 0);
      wctx.arc(0, 0, R, sa, ea); wctx.closePath();
      wctx.fillStyle = jg; wctx.fill();
      wctx.restore();

      // Warm highlight arc on the outer rim of the jackpot sector
      wctx.save();
      wctx.beginPath();
      wctx.arc(0, 0, R - 3, sa + 0.02, ea - 0.02);
      wctx.strokeStyle = '#FFE7B0';
      wctx.lineWidth = 4;
      wctx.shadowColor = 'rgba(255,205,77,0.95)';
      wctx.shadowBlur = 10;
      wctx.stroke();
      wctx.restore();
    } else {
      const shades = SHADE_BY_UNITS[sec.units][sec.units === 4 ? (shadeIdx4++ % 2) : (shadeIdx3++ % 2)];
      const g = wctx.createRadialGradient(0, 0, R * 0.15, 0, 0, R);
      g.addColorStop(0, shades[0]);
      g.addColorStop(1, shades[1]);
      wctx.beginPath(); wctx.moveTo(0, 0);
      wctx.arc(0, 0, R, sa, ea); wctx.closePath();
      wctx.fillStyle = g; wctx.fill();
    }

    // Text: prize label, same size everywhere
    wctx.save();
    wctx.rotate(mid);
    wctx.textBaseline = 'middle';
    wctx.textAlign = 'right';
    wctx.font = '800 19px -apple-system,sans-serif';

    if (sec.value === 250000) {
      wctx.fillStyle = '#ffffff';
      wctx.fillText('250.000₫', R - 14, 0);
    } else if (sec.units === 4) {
      wctx.fillStyle = '#14211a';
      wctx.fillText('50.000₫', R - 14, 0);
    } else {
      wctx.fillStyle = '#3A2560';
      wctx.fillText('50.000₫', R - 14, 0);
    }
    wctx.restore();
  });

  // ── Thin white spoke lines at each sector boundary ──
  wctx.save();
  wctx.strokeStyle = 'rgba(255,255,255,0.75)';
  wctx.lineWidth = 2;
  sectors.forEach(sec => {
    const angle = BASE_ANGLE + sec.startAngle;
    wctx.beginPath();
    wctx.moveTo(0, 0);
    wctx.lineTo(Math.cos(angle) * R, Math.sin(angle) * R);
    wctx.stroke();
  });
  wctx.restore();

  wctx.restore(); // undo rotation

  // ── Centre hub ──
  wctx.beginPath(); wctx.arc(0, 0, 34, 0, Math.PI * 2);
  wctx.fillStyle = '#ffffff'; wctx.fill();

  const dg = wctx.createRadialGradient(-4, -4, 0, 0, 0, 20);
  dg.addColorStop(0, '#D3F088'); dg.addColorStop(1, '#A3DD3A');
  wctx.beginPath(); wctx.arc(0, 0, 20, 0, Math.PI * 2);
  wctx.fillStyle = dg; wctx.fill();

  wctx.beginPath(); wctx.arc(-4, -4, 8, 0, Math.PI * 2);
  wctx.fillStyle = 'rgba(255,255,255,0.45)'; wctx.fill();

  wctx.restore();
}

function getSectorAtPointer(rot) {
  const TAU = 2 * Math.PI;
  const rel = ((-rot) % TAU + TAU) % TAU;
  for (const s of sectors) {
    const a = ((s.startAngle % TAU) + TAU) % TAU;
    const b = a + s.spanAngle;
    if (b <= TAU) {
      if (rel >= a && rel < b) return s;
    } else {
      if (rel >= a || rel < b - TAU) return s;
    }
  }
  return sectors[0];
}

// ═══════════ QR CODES ═══════════
function drawQR(id, seed) {
  const qc = document.getElementById(id); if (!qc) return;
  const qx = qc.getContext('2d');
  // HiDPI for QRs too
  const dpr = Math.max(1, window.devicePixelRatio || 1);
  const cssSize = qc.width;
  qc.width = cssSize * dpr; qc.height = cssSize * dpr;
  qc.style.width = cssSize + 'px'; qc.style.height = cssSize + 'px';
  qx.scale(dpr, dpr);
  const sz = cssSize, M = 21, cs = sz / M;
  qx.fillStyle = '#fff'; qx.fillRect(0, 0, sz, sz);
  function bit(r, c) {
    let h = seed + r*7919 + c*6151;
    h = Math.imul(h^(h>>>16), 0x45d9f3b);
    h = Math.imul(h^(h>>>16), 0x45d9f3b);
    return (h^(h>>>16)) & 1;
  }
  qx.fillStyle = '#14211a';
  for (let r = 0; r < M; r++) for (let c = 0; c < M; c++) {
    if (r<9&&c<9) continue; if (r<9&&c>M-9) continue; if (r>M-9&&c<9) continue;
    if (bit(r,c)) qx.fillRect(c*cs, r*cs, cs, cs);
  }
  function finder(ox, oy) {
    qx.fillStyle='#14211a'; qx.fillRect(ox,oy,7*cs,7*cs);
    qx.fillStyle='#fff';    qx.fillRect(ox+cs,oy+cs,5*cs,5*cs);
    qx.fillStyle='#14211a'; qx.fillRect(ox+2*cs,oy+2*cs,3*cs,3*cs);
  }
  finder(0,0); finder((M-7)*cs,0); finder(0,(M-7)*cs);
  for (let i=8;i<=M-9;i++) {
    qx.fillStyle=i%2===0?'#14211a':'#fff';
    qx.fillRect(i*cs,6*cs,cs,cs); qx.fillRect(6*cs,i*cs,cs,cs);
  }
}

// ═══════════ BUILD RESULT PANEL ═══════════
function buildCombos(amount) {
  const listEl = document.getElementById('combosList');
  listEl.innerHTML = '';
  REDEEMS[amount].forEach((combo, ci) => {
    if (ci > 0) {
      const d = document.createElement('div'); d.className = 'combo-or';
      d.innerHTML = `<div class="combo-or-line"></div><div class="combo-or-text">or</div><div class="combo-or-line"></div>`;
      listEl.appendChild(d);
    }
    const row = document.createElement('div'); row.className = 'combo-row';
    combo.forEach(part => {
      const item = ITEMS[part.key];
      if (part.n >= 4) {
        const ico = document.createElement('span'); ico.className = 'c-icon'; ico.textContent = item.icon; row.appendChild(ico);
        const x = document.createElement('span'); x.className = 'c-plus'; x.textContent = `× ${part.n}`; row.appendChild(x);
      } else {
        for (let j = 0; j < part.n; j++) {
          if (j > 0) { const p = document.createElement('span'); p.className='c-plus'; p.textContent='+'; row.appendChild(p); }
          const ico = document.createElement('span'); ico.className='c-icon'; ico.textContent=item.icon; row.appendChild(ico);
        }
      }
    });
    listEl.appendChild(row);
  });
}

function buildQRGrid(amount) {
  const grid = document.getElementById('qrBottomGrid'); grid.innerHTML = '';
  QR_KEYS[amount].forEach(key => {
    const item = ITEMS[key], cid = `qr_dyn_${key}`;
    const w = document.createElement('div'); w.className = 'qr-btm-item';
    w.innerHTML = `<canvas id="${cid}" width="120" height="120"></canvas>
                   <span class="qr-btm-icon">${item.icon}</span>
                   <div class="qr-btm-name">${item.name}</div>
                   <div class="qr-btm-price">${fmtVND(item.price)} ₫</div>`;
    grid.appendChild(w); drawQR(cid, item.seed);
  });
}

// ═══════════ SPIN ═══════════
function spin() {
  if (isSpinning) return;
  if (totalPrize <= 0) { document.getElementById('emptyBanner').style.display='block'; return; }
  document.getElementById('emptyBanner').style.display = 'none';
  // Reset result panel back to empty state before spinning
  document.getElementById('resultWon').classList.remove('visible');
  document.getElementById('resultEmpty').style.display = 'flex';

  isSpinning = true;
  document.getElementById('spinBtn').disabled = true;
  document.getElementById('resetBtn').disabled = true;

  const totalSpin = (5 + Math.random()*3.5)*2*Math.PI + Math.random()*2*Math.PI;
  const startRot = currentRot, dur = 4200 + Math.random()*900, t0 = performance.now();
  const ease = t => 1 - Math.pow(1-t, 4);

  (function frame(now) {
    const t = Math.min((now-t0)/dur, 1);
    currentRot = startRot + ease(t)*totalSpin;
    drawWheel(currentRot);
    t < 1 ? requestAnimationFrame(frame) : onSpinEnd(startRot+totalSpin);
  })(t0);
}

function onSpinEnd(final) {
  currentRot = final; drawWheel(currentRot); isSpinning = false;
  const ptr = document.getElementById('pointer');
  ptr.classList.remove('bounce'); void ptr.offsetWidth; ptr.classList.add('bounce');
  wonAmount = getSectorAtPointer(currentRot).value;
  setTimeout(showResult, 550);
}

// ═══════════ SHOW RESULT (right panel) ═══════════
function showResult() {
  document.getElementById('wonAmountDisplay').textContent = fmtVND(wonAmount);
  buildCombos(wonAmount);
  document.getElementById('resultEmpty').style.display = 'none';
  const won = document.getElementById('resultWon');
  won.classList.remove('visible'); void won.offsetWidth; won.classList.add('visible');
}

// ═══════════ VALIDATE ═══════════
function validate() {
  // Flip result panel back to empty state
  document.getElementById('resultWon').classList.remove('visible');
  document.getElementById('resultEmpty').style.display = 'flex';

  const startVal = totalPrize, endVal = Math.max(0, totalPrize - wonAmount);
  const dur = 1300, t0 = performance.now();
  const el = document.getElementById('prizeDisplay');
  const box = document.getElementById('prizeBox');

  box.style.transition = 'transform 0.2s';
  el.style.color = '#e63946';

  (function animDown(now) {
    const t = Math.min((now-t0)/dur, 1);
    el.textContent = fmtVND(Math.round(startVal - (1-Math.pow(1-t,3))*(startVal-endVal)));
    if (t < 1) { requestAnimationFrame(animDown); }
    else {
      totalPrize = endVal; el.textContent = fmtVND(totalPrize);
      setTimeout(() => {
        el.style.color = ''; box.style.transition = '';
        document.getElementById('spinBtn').disabled = totalPrize <= 0;
        document.getElementById('resetBtn').disabled = false;
        if (totalPrize <= 0) document.getElementById('emptyBanner').style.display = 'block';
      }, 350);
    }
  })(t0);
}

// ═══════════ RESET ═══════════
function resetPrize() {
  totalPrize = TOTAL;
  const el = document.getElementById('prizeDisplay');
  el.textContent = fmtVND(totalPrize); el.style.color = '';
  document.getElementById('emptyBanner').style.display = 'none';
  document.getElementById('spinBtn').disabled = false;
  const box = document.getElementById('prizeBox');
  box.style.transition = 'transform 0.3s cubic-bezier(.34,1.56,.64,1)';
  box.style.transform = 'scale(1.03)';
  setTimeout(() => { box.style.transform='scale(1)'; setTimeout(()=>box.style.transition='',320); }, 320);
}

// ═══════════ FORMAT & INIT ═══════════
function fmtVND(n) { return Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g, '.'); }
document.getElementById('prizeDisplay').textContent = fmtVND(totalPrize);
drawWheel(0);
</script>
